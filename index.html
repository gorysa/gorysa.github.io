<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <title>メモアプリ</title>
</head>
<body>
  <main class="app">
    <h1>メモアプリ</h1>
    <p class="subtitle">ブラウザにメモを保存できます（自動保存）</p>

    <section class="memo-form" aria-label="メモ作成フォーム">
      <label for="memo-input">新しいメモ</label>
      <div class="input-row">
        <textarea id="memo-input" rows="3" placeholder="例: 買い物リストを作る"></textarea>
        <button id="add-button" type="button">追加</button>
      </div>
    </section>

    <section class="memo-list-section" aria-live="polite">
      <div class="list-header">
        <h2>メモ一覧</h2>
        <button id="clear-button" type="button" class="danger">すべて削除</button>
      </div>
      <ul id="memo-list" class="memo-list"></ul>
      <p id="empty-message" class="empty-message">まだメモがありません。</p>
    </section>
  </main>

  <template id="memo-item-template">
    <li class="memo-item">
      <input class="memo-text" type="text" aria-label="メモ内容">
      <div class="memo-actions">
        <button type="button" class="save-button">保存</button>
        <button type="button" class="delete-button danger">削除</button>
      </div>
    </li>
  </template>

  <script src="script.js" defer></script>
</body>
</html>
